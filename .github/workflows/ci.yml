name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # THE LEAK GATE (CLAUDE.md): the seeded-secrets corpus must pass on
      # every commit — zero Tier-1 misses. Runs first and fails the build loud.
      - name: Leak test (zero Tier-1 misses)
        run: pnpm exec vitest run packages/redact/test/leak.test.ts

      - name: Unit tests
        run: pnpm test

      - name: End-to-end tests
        run: pnpm exec vitest run --config e2e/vitest.config.ts
