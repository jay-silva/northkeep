name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm pinned exactly: a floating "11" resolved to 11.17.0, which needs
      # node:sqlite (Node >= 22.5) and crashed on the Node-20 runner before a
      # single test ran — CI was silently red from 2026-07-19. 11.9.0 matches
      # local dev. Node 24 matches dev and the bundled desktop sidecar (24.14).
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # THE LEAK GATE (CLAUDE.md): the seeded-secrets corpus must pass on
      # every commit — zero Tier-1 misses. Runs first and fails the build loud.
      - name: Leak test (zero Tier-1 misses)
        run: pnpm exec vitest run packages/redact/test/leak.test.ts

      - name: Unit tests
        run: pnpm test

      - name: End-to-end tests
        run: pnpm exec vitest run --config e2e/vitest.config.ts
