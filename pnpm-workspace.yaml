packages:
  - "packages/*"
  - "apps/*"

# Native modules (and esbuild for vitest) need their install scripts.
allowBuilds:
  better-sqlite3: true
  sodium-native: true
  esbuild: true
  # Skipped on purpose: its native build only matters for the on-device
  # (EAS/CocoaPods) compile, not for Metro's JS bundle or the Node test suite.
  # Running it during a local monorepo install fails/hangs here.
  react-native-libsodium: false
  # Same rationale as react-native-libsodium: llama.rn's native (llama.cpp)
  # compile only matters for the on-device EAS/CocoaPods build, never for Metro's
  # JS bundle or the Node test suite. Skipped here so the monorepo install/build
  # does not run (or fail on) its prebuild-install step. (M6-4 / ADR 0023.)
  llama.rn: false
